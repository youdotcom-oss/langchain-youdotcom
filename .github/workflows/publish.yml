name: Publish Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Prerelease number (optional, creates x.y.z.devN)"
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    name: Update Version
    permissions:
      contents: write
    outputs:
      version: ${{ steps.set_version.outputs.version }}
      is_prerelease: ${{ steps.set_version.outputs.is_prerelease }}
    steps:
      - name: Validate inputs
        env:
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if [[ "$INPUT_BUMP" != "patch" && "$INPUT_BUMP" != "minor" && "$INPUT_BUMP" != "major" ]]; then
            echo "::error::Invalid bump type: $INPUT_BUMP"
            exit 1
          fi

          if [[ -n "$INPUT_PRERELEASE" ]] && ! echo "$INPUT_PRERELEASE" | grep -qE '^[0-9]+$'; then
            echo "::error::Prerelease must be a number, got: $INPUT_PRERELEASE"
            exit 1
          fi

          echo "✓ Input validation passed"

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLISH_TOKEN }}

      - name: Compute version
        id: set_version
        env:
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          CURRENT=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT"

          BASE=$(echo "$CURRENT" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

          case "$INPUT_BUMP" in
            major) BASE_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) BASE_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) BASE_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "Bumped base: $BASE_VERSION"

          if [[ -n "$INPUT_PRERELEASE" ]]; then
            echo "version=${BASE_VERSION}.dev${INPUT_PRERELEASE}" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "✅ Computed version: $(grep '^version=' "$GITHUB_OUTPUT" | head -1)"

      - name: Validate computed version
        env:
          VERSION: ${{ steps.set_version.outputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.dev[0-9]+)?$ ]]; then
            echo "::error::Invalid version: $VERSION"
            exit 1
          fi
          echo "✅ Version format valid: $VERSION"

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Configure Git
        env:
          GIT_AUTHOR_NAME: ${{ github.actor }}
          GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: |
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"

      - name: Bump version in pyproject.toml and lock
        env:
          VERSION: ${{ steps.set_version.outputs.version }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          uv lock

          WRITTEN=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [[ "$WRITTEN" != "$VERSION" ]]; then
            echo "::error::Version mismatch after write: $WRITTEN != $VERSION"
            exit 1
          fi

          git add pyproject.toml uv.lock
          if ! git diff --staged --quiet; then
            git commit -m "ci: publish v${VERSION} [skip ci]"
            git push origin "$BRANCH_NAME"
          fi

  pypi-publish:
    runs-on: ubuntu-latest
    name: Publish to PyPI
    needs: [update-version]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build
        run: uv build

      - name: Publish to PyPI (Trusted Publishing)
        env:
          IS_PRERELEASE: ${{ needs.update-version.outputs.is_prerelease }}
        run: uv publish --trusted-publishing always

  create-release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    needs: [update-version, pypi-publish]
    if: always() && needs.pypi-publish.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          VERSION: ${{ needs.update-version.outputs.version }}
          IS_PRERELEASE: ${{ needs.update-version.outputs.is_prerelease }}
        run: |
          TAG="v${VERSION}"

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes \
              --prerelease
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes
          fi
